<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tituloPantalla}">Catálogo Estático</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .empty-state { color: #555; font-style: italic; background: #eaeaea; padding: 15px; border-radius: 5px; }
        .pagination { margin-top: 16px; display: flex; align-items: center; gap: 10px; }
        .page-btn { padding: 8px 12px; border-radius: 4px; text-decoration: none; font-weight: bold; border: 1px solid #ccc; }
        .page-btn.enabled { background: #4CAF50; color: white; border-color: #4CAF50; }
        .page-btn.disabled { background: #eee; color: #999; pointer-events: none; }
        .page-info { color: #333; font-weight: bold; }
    </style>
</head>
<body>

<!-- th:replace="ruta/archivo :: nombreFragmento" -->
<div th:replace="~{libros/layout/componentes :: navbar}"></div>

<div style="margin: 20px;">

</div>



<!-- El texto de aquí adentro cambiará por lo que enviamos en "tituloPantalla" -->
<h1 th:text="${tituloPantalla}">Lista de Libros</h1>
<div style="margin-bottom: 20px;">
    <a th:href="@{/ui/libros/nuevo}" style="padding: 10px 15px; background-color: #008CBA; color: white; text-decoration: none; border-radius: 4px; display: inline-block; font-weight: bold;">
        + Agregar Nuevo Libro
    </a>
</div>

<!-- Si la lista está vacía, se muestra este mensaje -->
<div th:if="${#lists.isEmpty(libros)}" class="empty-state">
    <p>No hay libros registrados en el sistema actualmente.</p>
</div>

<!-- Si la lista TIENE libros, se dibuja esta tabla -->
<table th:unless="${#lists.isEmpty(libros)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Fecha</th>
        <th>Precio</th>
        <th>Editorial</th>
        <th>País</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <!-- Este es un bucle. Por cada "libro" en la lista de "libros", creará una fila -->
    <tr th:each="libro : ${libros}">
        <td th:text="${libro.id}">1</td>
        <td th:text="${libro.titulo}">Título de Prueba</td>
        <td th:text="${libro.fechaPublicacion}">2026-01-01</td>
        <td th:text="${libro.precio}">0.00</td>
        <td th:text="${libro.editorialNombre}">Editorial</td>
        <td th:text="${libro.pais}">País</td>
        <td>
            <form th:action="@{/ui/libros/{id}/descatalogar(id=${libro.id})}" method="post" style="margin: 0;">
                <input type="hidden" name="page" th:value="${currentPage}" />
                <input type="hidden" name="size" value="50" />
                <button type="submit"
                        style="padding: 6px 10px; background-color: #c62828; color: white; border: 0; border-radius: 4px; cursor: pointer;">
                    Descatalogar
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:unless="${#lists.isEmpty(libros)}">
    <a th:href="@{/ui/libros(page=${currentPage - 1},size=50)}"
       th:class="${hasPrevious} ? 'page-btn enabled' : 'page-btn disabled'">Anterior</a>

    <span class="page-info" th:text="'Página ' + (${currentPage} + 1)">Página 1</span>

    <a th:href="@{/ui/libros(page=${currentPage + 1},size=50)}"
       th:class="${hasNext} ? 'page-btn enabled' : 'page-btn disabled'">Siguiente</a>
</div>
<div th:replace="~{libros/layout/componentes :: footer}"></div>

</body>
</html>
