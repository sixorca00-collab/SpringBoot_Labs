<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tituloPantalla}">Catálogo Estático</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .empty-state { color: #555; font-style: italic; background: #eaeaea; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>

<!-- El texto de aquí adentro cambiará por lo que enviamos en "tituloPantalla" -->
<h1 th:text="${tituloPantalla}">Lista de Libros</h1>
<div style="margin-bottom: 20px;">
    <a th:href="@{/ui/libros/nuevo}" style="padding: 10px 15px; background-color: #008CBA; color: white; text-decoration: none; border-radius: 4px; display: inline-block; font-weight: bold;">
        + Agregar Nuevo Libro
    </a>
</div>

<!-- Si la lista está vacía, se muestra este mensaje -->
<div th:if="${#lists.isEmpty(libros)}" class="empty-state">
    <p>No hay libros registrados en el sistema actualmente.</p>
</div>

<!-- Si la lista TIENE libros, se dibuja esta tabla -->
<table th:unless="${#lists.isEmpty(libros)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Autor</th>
        <th>ISBN</th>
        <th>Año</th>
    </tr>
    </thead>
    <tbody>
    <!-- Este es un bucle. Por cada "libro" en la lista de "libros", creará una fila -->
    <tr th:each="libro : ${libros}">
        <td th:text="${libro.id}">1</td>
        <td th:text="${libro.titulo}">Título de Prueba</td>
        <td th:text="${libro.autor}">Autor de Prueba</td>
        <td th:text="${libro.isbn}">000-000</td>
        <td th:text="${libro.anioPublicacion}">2026</td>
    </tr>
    </tbody>
</table>

</body>
</html>
