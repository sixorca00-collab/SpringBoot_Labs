<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tituloPantalla}">Nuevo Libro</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f9f9f9; }
        .form-wrapper { max-width: 760px; background: white; border: 1px solid #ddd; border-radius: 6px; padding: 24px; margin-top: 20px; }
        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #333; }
        input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .actions { margin-top: 18px; display: flex; gap: 10px; }
        .btn { padding: 10px 15px; color: white; text-decoration: none; border: 0; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #4CAF50; }
        .btn-secondary { background-color: #777; }
        .error-box { background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div th:replace="~{libros/layout/componentes :: navbar}"></div>

<h1 th:text="${tituloPantalla}">Nuevo Libro</h1>

<div class="form-wrapper">
    <div th:if="${ErrorAnio}" class="error-box">
        <strong th:text="${ErrorAnio}">Mensaje de error genérico</strong>
    </div>

    <form th:action="@{/ui/libros/guardar}" th:object="${libro}" method="post">
        <div class="form-group">
            <label for="titulo">Título del Libro</label>
            <input id="titulo" type="text" th:field="*{titulo}" required />
        </div>

        <div class="form-group">
            <label for="autor">Autor</label>
            <input id="autor" type="text" th:field="*{autor}" required />
        </div>

        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input id="isbn" type="text" th:field="*{isbn}" required />
        </div>

        <div class="form-group">
            <label for="fechaPublicacion">Fecha de Publicación</label>
            <input id="fechaPublicacion" type="date" th:field="*{fechaPublicacion}" required />
        </div>

        <div class="form-group">
            <label for="precio">Precio</label>
            <input id="precio" type="number" step="0.01" th:field="*{precio}" required />
        </div>

        <div class="form-group">
            <label for="editorialId">ID de Editorial (1 a 10)</label>
            <input id="editorialId" type="number" th:field="*{editorial.id}" min="1" max="10" required />
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary">Guardar Libro</button>
            <a th:href="@{/ui/libros}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{libros/layout/componentes :: footer}"></div>

</body>
</html>
