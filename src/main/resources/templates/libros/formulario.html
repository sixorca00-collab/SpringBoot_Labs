<div class="form-container">
    <h1 th:text="${tituloPantalla}">Nuevo Libro</h1>

    <div th:if="${ErrorAnio}" style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
        <strong th:text="${ErrorAnio}">Mensaje de error genérico</strong>
    </div>

    <form th:action="@{/ui/libros/guardar}" th:object="${libro}" method="post">

        <div class="form-group">
            <label for="titulo">Título del Libro:</label>
            <input type="text" th:field="*{titulo}" required />
        </div>

        <div class="form-group">
            <label for="autor">Autor:</label>
            <input type="text" th:field="*{autor}" required />
        </div>

        <div class="form-group">
            <label for="isbn">ISBN:</label>
            <input type="text" th:field="*{isbn}" required />
        </div>

        <div class="form-group">
            <label for="fechaPublicacion">Fecha de Publicación:</label>
            <input type="date" th:field="*{fechaPublicacion}" required />
        </div>

        <div class="form-group">
            <label for="precio">Precio:</label>
            <input type="number" step="0.01" th:field="*{precio}" required />
        </div>

        <div class="form-group">
            <label for="editorial">ID de la Editorial (Prueba del 1 al 10):</label>
            <input type="number" th:field="*{editorial.id}" min="1" max="10" required />
        </div>

        <button type="submit">Guardar Libro</button>
        <a th:href="@{/ui/libros}" class="btn-cancel">Cancelar</a>

    </form>
</div>
