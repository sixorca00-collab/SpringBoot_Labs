spring.application.name=librotech

# ===== CONFIGURACIÓN DE H2 =====
spring.datasource.url=jdbc:h2:file:./data/librotech_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== ORDEN DE ARRANQUE CRÍTICO (CONFIG QUE FALTA) =====
# Le dice a Hibernate que espere a que Flyway monte las tablas antes de validar
#spring.jpa.defer-datasource-initialization=true

# ===== HIBERNATE & JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===== CONFIGURACIÓN DE FLYWAY =====
spring.flyway.enabled=true
#spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# ===== CONSOLA H2 Y LOGS =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=true
